#--------------------------------------------------------------
# HAProxy — Configuration Load Balancer HA
# Documentation : https://www.haproxy.org/download/2.8/doc/
#--------------------------------------------------------------

global
    log         /dev/log local0 info
    # Envoie les logs vers le daemon syslog du conteneur (capturé par Wazuh)

    maxconn     10000
    # Nombre maximum de connexions simultanées

    user        haproxy
    group       haproxy
    # Tourne avec un utilisateur non-root (principe moindre privilège)
    # Note : pas de directive "daemon" — le conteneur Docker requiert un processus foreground

    stats socket /run/haproxy/admin.sock mode 660 level admin
    # Socket Unix pour les commandes d'administration (reload, stats)

#--------------------------------------------------------------
defaults
    log         global
    mode        http
    # Mode HTTP = inspection des requêtes HTTP (vs mode tcp = niveau 4)

    option      httplog
    # Log complet des requêtes HTTP

    option      dontlognull
    # Ne log pas les health checks (évite le bruit)

    timeout     connect 5s
    timeout     client  30s
    timeout     server  30s
    # Timeouts raisonnables pour éviter les connexions zombies

    option      forwardfor
    # Ajoute l'en-tête X-Forwarded-For avec l'IP réelle du client

    option      http-server-close
    # Ferme la connexion côté serveur après chaque requête (économise les ressources)

#--------------------------------------------------------------
# Interface de statistiques HAProxy
# Accessible sur http://localhost:8404/stats
#--------------------------------------------------------------
frontend stats
    bind        *:8404
    stats       enable
    stats       uri /stats
    stats       refresh 5s
    stats       auth admin:TP_OPENSOURCE_2026!
    # Authentification basique sur le dashboard de stats

    stats       show-legends
    stats       show-node
    # Affiche le nom du nœud (utile en actif/passif pour savoir lequel répond)

#--------------------------------------------------------------
# FRONTEND — Point d'entrée HTTP (reçoit le trafic depuis le WAF)
#--------------------------------------------------------------
frontend http_front
    bind        *:80
    default_backend nginx_back

    # En-tête personnalisé pour tracer quel HAProxy a traité la requête
    http-response add-header X-Handled-By %[env(HOSTNAME)]

#--------------------------------------------------------------
# BACKEND — Pool de serveurs Nginx
#--------------------------------------------------------------
backend nginx_back
    balance     roundrobin
    # Algorithme round-robin : distribue les requêtes à tour de rôle
    # Alternatives : leastconn (moins de connexions), source (affinité IP)

    option      httpchk GET /health
    # Health check : vérifie /health sur chaque Nginx toutes les 2s

    http-check  expect string OK
    # Valide que la réponse contient "OK" (correspond à notre endpoint /health)

    server      nginx1 172.22.0.10:8080 check inter 2s rise 2 fall 3
    # inter 2s  : vérifie toutes les 2 secondes
    # rise 2    : 2 succès consécutifs pour marquer "up"
    # fall 3    : 3 échecs consécutifs pour marquer "down"

    server      nginx2 172.22.0.11:8080 check inter 2s rise 2 fall 3
