# rsyslog minimal — capture les logs HAProxy (facility local0)
$ModLoad imuxsock
$SystemLogSocketName /dev/log

# Force le format BSD traditionnel (Wazuh ne parse pas RFC 5424 nativement)
# Format : "Apr 23 10:00:00 hostname program[pid]: message"
$ActionFileDefaultTemplate RSYSLOG_TraditionalFileFormat

# local0 = facility utilisée par HAProxy (cf. haproxy.cfg : log /dev/log local0)
local0.*    /var/log/haproxy/haproxy.log

# Tout le reste va dans messages
*.info;local0.none  /var/log/messages
