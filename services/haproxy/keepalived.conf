# ============================================================
# Keepalived — VRRP pour la VIP flottante entre HAProxy x2
# ============================================================
# Ce fichier est pour le nœud MASTER (HAProxy #1)
# Pour le BACKUP (HAProxy #2), changer : state BACKUP, priority 90

vrrp_script chk_haproxy {
    script "killall -0 haproxy"
    # Vérifie que le processus haproxy tourne
    # killall -0 = envoi signal 0 (test existence sans tuer)

    interval 2
    # Vérifie toutes les 2 secondes

    weight -20
    # Si le script échoue : diminue la priorité de 20
    # → l'autre nœud avec priorité plus haute prend la VIP
}

vrrp_instance VI_1 {
    state MASTER
    # MASTER = nœud actif par défaut (HAProxy #1)
    # BACKUP = nœud passif (HAProxy #2)

    interface eth0
    # Interface réseau sur laquelle flotte la VIP
    # Dans Docker, l'interface du réseau frontend

    virtual_router_id 51
    # ID du groupe VRRP (doit être identique sur master ET backup)

    priority 100
    # Priorité : le nœud avec la priorité la plus haute est MASTER
    # HAProxy #1 = 100, HAProxy #2 = 90

    advert_int 1
    # Envoi un "je suis vivant" (VRRP advertisement) toutes les secondes

    authentication {
        auth_type PASS
        auth_pass vrrp_secret_2024
        # Mot de passe partagé entre les deux nœuds VRRP
    }

    virtual_ipaddress {
        172.21.0.100/24
        # VIP (Virtual IP) qui flotte entre les deux HAProxy
        # C'est cette IP que le WAF utilise pour joindre HAProxy
    }

    track_script {
        chk_haproxy
        # Si HAProxy s'arrête → priorité baisse → VIP migre vers le backup
    }
}
