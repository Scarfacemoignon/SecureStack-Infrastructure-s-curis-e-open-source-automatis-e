%YAML 1.1
---
# ============================================================
# Suricata — Configuration IDS en dérivation (mode passif)
# ============================================================

# ── Variables réseau ─────────────────────────────────────────
vars:
  address-groups:
    HOME_NET: "[172.20.0.0/24,172.21.0.0/24,172.22.0.0/24,172.23.0.0/24]"
    # HOME_NET = nos réseaux internes (Docker)

    EXTERNAL_NET: "!$HOME_NET"
    # EXTERNAL_NET = tout ce qui n'est pas HOME_NET (Internet)

    HTTP_SERVERS: "$HOME_NET"
    SQL_SERVERS: "[172.22.0.20,172.22.0.21]"
    DNS_SERVERS: "$HOME_NET"

  port-groups:
    HTTP_PORTS: "80"
    HTTPS_PORTS: "443"
    SQL_PORTS: "3306"

# ── Capture réseau ───────────────────────────────────────────
# pcap any = capture sur toutes les interfaces (hôte + bridges Docker br-XXXX)
pcap:
  - interface: any

# ── Moteur de détection ──────────────────────────────────────
detect:
  profile: medium
  # Profil medium = bon équilibre performance/détection

# ── Format de sortie (EVE JSON) ──────────────────────────────
outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: /var/log/suricata/eve.json
      # Format JSON structuré, lu nativement par Wazuh

      types:
        - alert:
            payload: yes
            payload-buffer-size: 4kb
            # Inclut le contenu du paquet dans l'alerte (utile pour l'analyse)
        - http:
            extended: yes
            # Log détaillé des requêtes HTTP
        - dns
        - tls:
            extended: yes
        - files:
            force-magic: no
        - stats:
            totals: yes
            threads: no

  - fast:
      enabled: yes
      filename: /var/log/suricata/fast.log
      # Log rapide format texte (pour lecture humaine)

# ── Règles à charger ─────────────────────────────────────────
rule-files:
  - /var/lib/suricata/rules/suricata.rules
  # Règles Emerging Threats mises à jour par suricata-update

# ── Logging interne Suricata ─────────────────────────────────
logging:
  default-log-level: notice
  outputs:
    - console:
        enabled: yes
    - file:
        enabled: yes
        filename: /var/log/suricata/suricata.log
