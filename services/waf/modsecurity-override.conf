# ============================================================
# ModSecurity — Configuration principale
# ============================================================

# ── Mode de fonctionnement ────────────────────────────────────
# DetectionOnly : log seulement, ne bloque pas (pour les tests)
# On             : bloque les requêtes malveillantes
SecRuleEngine On

# ── Inspection du corps des requêtes ─────────────────────────
SecRequestBodyAccess On
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html text/xml application/json

# ── Taille maximale du corps inspectable ─────────────────────
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072

# ── Logs d'audit complets ─────────────────────────────────────
SecAuditEngine RelevantOnly
# RelevantOnly : log uniquement les requêtes déclenchant des règles
# On            : log tout (très verbeux, pour le debug)

SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity/audit.log
# Ce fichier est lu par l'agent Wazuh

# ── Données sensibles à masquer dans les logs ────────────────
SecArgumentSeparator &
SecCookieFormat 0

# ── Niveau de paranoïa CRS ────────────────────────────────────
# Note : les fichiers CRS sont déjà inclus par l'image de base owasp/modsecurity-crs
# Niveau 1 : règles de base (peu de faux positifs) — recommandé pour débuter
# Niveau 2-4 : de plus en plus strict
SecAction \
  "id:900000, \
   phase:1, \
   nolog, \
   pass, \
   t:none, \
   setvar:tx.paranoia_level=1"

# ── Score d'anomalie avant blocage ───────────────────────────
# Score 5 = une règle critique (ex: SQLi évidente)
# Score 10 = plusieurs règles moins critiques
SecAction \
  "id:900110, \
   phase:1, \
   nolog, \
   pass, \
   t:none, \
   setvar:tx.inbound_anomaly_score_threshold=5, \
   setvar:tx.outbound_anomaly_score_threshold=4"
