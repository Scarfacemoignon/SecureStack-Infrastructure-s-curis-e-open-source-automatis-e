# ============================================================
# Nginx — Configuration du WAF ModSecurity
# Rôle : reverse proxy frontal avec inspection WAF
# ============================================================

server {
    listen 80;
    server_name _;

    # ── Logs WAF (format enrichi pour Wazuh) ─────────────────
    access_log  /var/log/nginx/access.log combined;
    error_log   /var/log/nginx/error.log warn;

    # ── ModSecurity activé ────────────────────────────────────
    modsecurity on;
    modsecurity_rules_file /etc/modsecurity.d/setup.conf;

    # ── Masquer les informations serveur ──────────────────────
    server_tokens off;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # ── Health check local (pour le monitoring) ───────────────
    location /health {
        access_log  off;
        modsecurity off;
        # Désactive ModSecurity sur le health check (évite les faux positifs)
        return 200 "WAF-OK\n";
        add_header Content-Type text/plain;
    }

    # ── Proxy vers HAProxy (VIP Keepalived) ───────────────────
    location / {
        proxy_pass          http://172.21.0.100:80;
        # Tout le trafic inspecté par ModSecurity est transmis à HAProxy

        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }
}
