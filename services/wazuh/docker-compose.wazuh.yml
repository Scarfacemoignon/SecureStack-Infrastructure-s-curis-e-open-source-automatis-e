# ============================================================
# Wazuh Stack — Manager + Indexer + Dashboard
# Basé sur la stack officielle Wazuh 4.7
# Doc : https://documentation.wazuh.com/current/deployment-options/docker/
# ============================================================

version: "3.9"

services:

  # ── Wazuh Manager ─────────────────────────────────────────
  wazuh.manager:
    image: wazuh/wazuh-manager:4.7.0
    hostname: wazuh.manager
    container_name: wazuh-manager
    restart: unless-stopped
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
      - FILEBEAT_SSL_VERIFICATION_MODE=none
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
      - ./wazuh-manager.conf:/wazuh-config-mount/etc/ossec.conf
      - ./certs/root-ca.pem:/etc/ssl/wazuh-certs/root-ca.pem:ro
      - ./certs/manager.pem:/etc/ssl/wazuh-certs/manager.pem:ro
      - ./certs/manager-key.pem:/etc/ssl/wazuh-certs/manager-key.pem:ro
      # Logs ModSecurity et Suricata lus directement par le manager
      - modsec_logs:/var/log/modsecurity:ro
      - suricata_logs:/var/log/suricata:ro
    ports:
      - "1514:1514/udp"   # Agents → Manager (logs)
      - "1515:1515"       # Agents → Manager (enregistrement)
      - "514:514/udp"     # Syslog externe
      - "55000:55000"     # API REST Wazuh
    networks:
      management:
        ipv4_address: 172.23.0.10

  # ── Wazuh Indexer (OpenSearch) ────────────────────────────
  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.7.0
    hostname: wazuh.indexer
    container_name: wazuh-indexer
    restart: unless-stopped
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
      - ./opensearch.yml:/usr/share/wazuh-indexer/opensearch.yml
      - ./certs/indexer.pem:/usr/share/wazuh-indexer/certs/indexer.pem:ro
      - ./certs/indexer-key.pem:/usr/share/wazuh-indexer/certs/indexer-key.pem:ro
      - ./certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem:ro
      - ./certs/admin.pem:/usr/share/wazuh-indexer/certs/admin.pem:ro
      - ./certs/admin-key.pem:/usr/share/wazuh-indexer/certs/admin-key.pem:ro
    networks:
      management:
        ipv4_address: 172.23.0.30
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

  # ── Wazuh Dashboard ───────────────────────────────────────
  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.7.0
    hostname: wazuh.dashboard
    container_name: wazuh-dashboard
    restart: unless-stopped
    depends_on:
      - wazuh.indexer
      - wazuh.manager
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${INDEXER_PASSWORD}
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=${INDEXER_PASSWORD}
    volumes:
      - ./opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
      - ./certs/dashboard.pem:/usr/share/wazuh-dashboard/config/certs/dashboard.pem:ro
      - ./certs/dashboard-key.pem:/usr/share/wazuh-dashboard/config/certs/dashboard-key.pem:ro
      - ./certs/root-ca.pem:/usr/share/wazuh-dashboard/config/certs/root-ca.pem:ro
    ports:
      - "5601:5601"
      # Dashboard accessible sur http://localhost:5601
    networks:
      management:
        ipv4_address: 172.23.0.31

volumes:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_etc:
  filebeat_var:
  wazuh_indexer_data:
  # Volumes partagés avec l'infrastructure principale
  modsec_logs:
    external: true
    name: tp_opensource_modsec_logs
  suricata_logs:
    external: true
    name: tp_opensource_suricata_logs

networks:
  management:
    external: true
    name: tp_openSource_management
