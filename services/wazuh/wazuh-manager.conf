<!-- ============================================================
     Wazuh Manager — Configuration principale (ossec.conf)
     ============================================================ -->
<ossec_config>

  <!-- ── Paramètres globaux ──────────────────────────────── -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <!-- Sortie JSON pour Filebeat → OpenSearch -->

    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <!-- logall=yes pour le debug (très verbeux) -->

    <email_notification>no</email_notification>
    <!-- Activer si vous configurez un serveur SMTP -->
  </global>

  <!-- ── Règles d'alertes ────────────────────────────────── -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <!-- Niveau minimum pour logguer une alerte (0-15) -->
    <!-- 3 = info, 7 = warning, 10 = critique -->
  </alerts>

  <!-- ── Réception des logs des agents ───────────────────── -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>udp</protocol>
    <!-- Les agents envoient leurs logs ici (chiffrés) -->
  </remote>

  <!-- ── Décodeurs personnalisés ─────────────────────────── -->
  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
  </ruleset>

  <!-- ── Intégration ModSecurity ─────────────────────────── -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/modsecurity/audit.log</location>
    <!-- Wazuh lit les alertes ModSecurity en JSON -->
  </localfile>

  <!-- ── Intégration Suricata ────────────────────────────── -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/suricata/eve.json</location>
    <!-- Wazuh lit les alertes Suricata EVE JSON -->
  </localfile>

  <!-- ── File Integrity Monitoring (FIM) ─────────────────── -->
  <!-- Surveille les modifications de fichiers sensibles -->
  <syscheck>
    <frequency>300</frequency>
    <!-- Vérifie les fichiers toutes les 5 minutes -->

    <directories realtime="yes">/etc,/usr/bin,/usr/sbin</directories>
    <!-- realtime=yes = alerte immédiate dès modification -->

    <directories>/var/www,/etc/nginx,/etc/haproxy</directories>

    <ignore>/etc/mtab</ignore>
    <ignore>/etc/mnttab</ignore>
    <ignore>/etc/hosts.deny</ignore>
  </syscheck>

  <!-- ── Active Response (blocage automatique) ───────────── -->
  <!-- Exemple : bloquer une IP après 10 tentatives SSH échouées -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>etc/wpk_root.pem</ca_store>
    <ca_verification>yes</ca_verification>
  </active-response>

</ossec_config>
