<!-- ============================================================
     Wazuh Manager — Configuration principale (ossec.conf)
     ============================================================ -->
<ossec_config>

  <!-- ── Paramètres globaux ──────────────────────────────── -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <!-- Sortie JSON pour Filebeat → OpenSearch -->

    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <!-- logall=yes pour le debug (très verbeux) -->

    <email_notification>no</email_notification>
    <!-- Activer si vous configurez un serveur SMTP -->
  </global>

  <!-- ── Règles d'alertes ────────────────────────────────── -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <!-- Niveau minimum pour logguer une alerte (0-15) -->
    <!-- 3 = info, 7 = warning, 10 = critique -->
  </alerts>

  <!-- ── Réception des logs des agents ───────────────────── -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>udp</protocol>
    <!-- Les agents envoient leurs logs ici (chiffrés) -->
  </remote>

  <!-- ── Décodeurs et règles ────────────────────────────── -->
  <ruleset>
    <!-- Décodeurs intégrés puis personnalisés -->
    <decoder_dir>ruleset/decoders</decoder_dir>
    <decoder_dir>etc/decoders</decoder_dir>
    <!-- Règles intégrées puis personnalisées -->
    <rule_dir>ruleset/rules</rule_dir>
    <rule_dir>etc/rules</rule_dir>
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
  </ruleset>

  <!-- ── Intégration ModSecurity (WAF) ──────────────────── -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/modsecurity/audit.log</location>
  </localfile>

  <!-- ── Intégration Suricata (IDS) ──────────────────────── -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/suricata/eve.json</location>
  </localfile>

  <!-- ── Logs Nginx #1 ───────────────────────────────────── -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx1/access.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx1/error.log</location>
  </localfile>

  <!-- ── Logs Nginx #2 ───────────────────────────────────── -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx2/access.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx2/error.log</location>
  </localfile>

  <!-- ── Logs HAProxy #1 (MASTER) ────────────────────────── -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/haproxy1/haproxy.log</location>
  </localfile>

  <!-- ── Logs HAProxy #2 (BACKUP) ────────────────────────── -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/haproxy2/haproxy.log</location>
  </localfile>

  <!-- ── Logs MariaDB MASTER ─────────────────────────────── -->
  <!-- error.log : format natif MariaDB (decoder mariadb-syslog) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/mariadb-master/error.log</location>
  </localfile>

  <!-- slow.log : requêtes lentes, format multi-lignes -->
  <localfile>
    <log_format>mysql_log</log_format>
    <location>/var/log/mariadb-master/slow.log</location>
  </localfile>

  <!-- ── Logs MariaDB SLAVE ──────────────────────────────── -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/mariadb-slave/error.log</location>
  </localfile>

  <localfile>
    <log_format>mysql_log</log_format>
    <location>/var/log/mariadb-slave/slow.log</location>
  </localfile>

  <!-- ── File Integrity Monitoring (FIM) ─────────────────── -->
  <!-- Surveille les modifications de fichiers sensibles -->
  <syscheck>
    <frequency>300</frequency>
    <!-- Vérifie les fichiers toutes les 5 minutes -->

    <directories realtime="yes">/etc,/usr/bin,/usr/sbin</directories>
    <!-- realtime=yes = alerte immédiate dès modification -->

    <directories>/var/www,/etc/nginx,/etc/haproxy</directories>

    <ignore>/etc/mtab</ignore>
    <ignore>/etc/mnttab</ignore>
    <ignore>/etc/hosts.deny</ignore>
  </syscheck>


</ossec_config>
