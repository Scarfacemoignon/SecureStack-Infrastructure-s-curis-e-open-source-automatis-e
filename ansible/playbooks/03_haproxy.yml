---
# ============================================================
# Playbook 03 — HAProxy : Validation HA + Keepalived
# Usage : ansible-playbook playbooks/03_haproxy.yml
# ============================================================

- name: "HAProxy — Validation des stats (port exposé sur le host)"
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../group_vars/vault.yml

  tasks:

    - name: "Vérifier HAProxy stats (port 8404 exposé sur le host)"
      uri:
        url: "http://localhost:8404/stats"
        url_username: admin
        url_password: "{{ haproxy_stats_password }}"
        status_code: 200
        return_content: yes
      register: haproxy_stats
      retries: 3
      delay: 5

    - name: "HAProxy stats accessibles"
      debug:
        msg: "HAProxy stats : UP ({{ haproxy_stats.status }})"

    - name: "Vérifier les backends Nginx dans les stats CSV"
      uri:
        url: "http://localhost:8404/stats;csv"
        url_username: admin
        url_password: "{{ haproxy_stats_password }}"
        return_content: yes
      register: haproxy_csv

    - name: "Backends détectés dans HAProxy"
      debug:
        msg: "Backends UP : {{ haproxy_csv.content | regex_findall('nginx[^,]+,UP') }}"

    - name: "Valider que les deux Nginx sont UP"
      assert:
        that:
          - "'nginx1' in haproxy_csv.content"
          - "'nginx2' in haproxy_csv.content"
        fail_msg: "ERREUR : Un ou plusieurs backends Nginx sont DOWN !"
        success_msg: "OK : Les deux backends Nginx sont actifs"

- name: "HAProxy — État interne via docker exec (depuis localhost)"
  hosts: localhost
  gather_facts: false

  tasks:

    - name: "Vérifier les processus HAProxy et Keepalived"
      command: >
        docker exec {{ item }}
        sh -c "echo -n 'haproxy='; pgrep haproxy >/dev/null && echo UP || echo DOWN;
               echo -n 'keepalived='; pgrep keepalived >/dev/null && echo UP || echo DOWN"
      loop:
        - haproxy1
        - haproxy2
      register: haproxy_proc
      changed_when: false
      ignore_errors: true

    - name: "Processus HAProxy et Keepalived"
      debug:
        msg: "{{ item.item }} — {{ item.stdout_lines }}"
      loop: "{{ haproxy_proc.results }}"

- name: "HAProxy — Test de la VIP Keepalived"
  hosts: localhost
  gather_facts: false

  tasks:

    - name: "Tester la VIP Keepalived via un conteneur sur le réseau frontend"
      command: >
        docker exec waf
        wget -qO- --server-response http://172.21.0.100/ 2>&1
      register: vip_response
      changed_when: false
      ignore_errors: true

    - name: "Résultat VIP"
      debug:
        msg: >
          VIP 172.21.0.100 (depuis waf) :
          {{ 'OPÉRATIONNELLE' if vip_response.rc == 0 else 'INACCESSIBLE — ' + vip_response.stderr }}
