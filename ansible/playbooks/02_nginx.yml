---
# ============================================================
# Playbook 02 — Nginx : Validation et personnalisation
# Usage : ansible-playbook playbooks/02_nginx.yml
# ============================================================

- name: "Nginx — Validation et personnalisation (depuis localhost)"
  hosts: localhost
  gather_facts: false

  tasks:

    - name: "Health check sur chaque Nginx via docker exec"
      command: docker exec {{ item }} wget -qO- http://127.0.0.1:8080/health
      loop:
        - nginx1
        - nginx2
      register: health_checks
      changed_when: false
      ignore_errors: true

    - name: "Résultat health checks Nginx"
      debug:
        msg: "{{ item.item }} : {{ item.stdout | trim if item.rc == 0 else 'KO — ' + item.stderr }}"
      loop: "{{ health_checks.results }}"

    - name: "Version Nginx"
      command: docker exec {{ item }} nginx -v
      loop:
        - nginx1
        - nginx2
      register: nginx_versions
      changed_when: false
      ignore_errors: true

    - name: "Versions Nginx"
      debug:
        msg: "{{ item.item }} : {{ item.stderr | trim }}"
      loop: "{{ nginx_versions.results }}"

    - name: "Personnaliser index.html avec le hostname du nœud"
      command: >
        docker exec {{ item }}
        sh -c "sed -i 's/NGINX_NODE/{{ item }}/g' /usr/share/nginx/html/index.html 2>/dev/null; echo done"
      loop:
        - nginx1
        - nginx2
      changed_when: false
      ignore_errors: true

- name: "Nginx — Validation HTTP via HAProxy (depuis le réseau)"
  hosts: localhost
  gather_facts: false

  tasks:

    - name: "Tester Nginx via HAProxy (port 80 exposé sur le host)"
      command: curl -s -o /dev/null -w "%{http_code}" http://localhost/health
      register: nginx_via_haproxy
      changed_when: false
      ignore_errors: true

    - name: "Bilan accès Nginx via HAProxy → WAF → load balancer"
      debug:
        msg: "Accès HTTP (localhost:80) : {{ 'UP ✓ (HTTP ' + nginx_via_haproxy.stdout + ')' if nginx_via_haproxy.rc == 0 else 'KO ✗' }}"
