# ── Réseau ────────────────────────────────────────────────────
network_backend:    "172.22.0.0/24"
network_frontend:   "172.21.0.0/24"
network_dmz:        "172.20.0.0/24"
network_mgmt:       "172.23.0.0/24"

# ── IPs clés ──────────────────────────────────────────────────
mariadb_master_ip:  "172.22.0.20"
mariadb_slave_ip:   "172.22.0.21"
