---
# ============================================================
# Inventaire Ansible — Connexion via Docker exec
# ============================================================
all:
  vars:
    ansible_connection: community.docker.docker
    # Utilise docker exec au lieu de SSH (parfait pour les conteneurs locaux)

  children:

    # ── Bases de données ──────────────────────────────────────
    databases:
      hosts:
        mariadb-master:
          ansible_host: mariadb-master
          db_role: master

        mariadb-slave:
          ansible_host: mariadb-slave
          db_role: slave

    # ── Serveurs web ──────────────────────────────────────────
    webservers:
      hosts:
        nginx1:
          ansible_host: nginx1
          node_id: 1

        nginx2:
          ansible_host: nginx2
          node_id: 2

    # ── Load Balancers ────────────────────────────────────────
    loadbalancers:
      hosts:
        haproxy1:
          ansible_host: haproxy1
          keepalived_state: MASTER
          keepalived_priority: 100

        haproxy2:
          ansible_host: haproxy2
          keepalived_state: BACKUP
          keepalived_priority: 90

    # ── Sécurité ──────────────────────────────────────────────
    security:
      hosts:
        waf:
          ansible_host: waf

        suricata:
          ansible_host: suricata

    # ── SIEM ──────────────────────────────────────────────────
    siem:
      hosts:
        wazuh-manager:
          ansible_host: wazuh-manager
