[defaults]
inventory           = inventory.yml
host_key_checking   = False
# Désactivé pour le lab (les conteneurs n'ont pas de clés SSH fixes)

retry_files_enabled = False
stdout_callback     = yaml
# Sortie YAML plus lisible que le format par défaut

[privilege_escalation]
become              = True
become_method       = sudo

[ssh_connection]
pipelining          = True
# Réduit le nombre de connexions SSH (meilleure performance)
